services:
  app:
    build: .
    container_name: canvas-school-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/concentrate-quiz
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-development-secret-change-before-production
      DEMO_ADMIN_PASSWORD: AdminDemo123!
      DEMO_TEACHER_PASSWORD: TeacherDemo123!
      DEMO_STUDENT_PASSWORD: StudentDemo123!
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:17-alpine
    container_name: concentrate-quiz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: concentrate-quiz
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: school-portal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
