name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: concentrate-quiz
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/concentrate-quiz
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-secret-that-is-longer-than-thirty-two-characters
      DEMO_ADMIN_PASSWORD: AdminDemo123!
      DEMO_TEACHER_PASSWORD: TeacherDemo123!
      DEMO_STUDENT_PASSWORD: StudentDemo123!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm coverage
      - run: pnpm test:integration
        env:
          RUN_INTEGRATION: '1'
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          NODE_ENV: production
      - run: docker build -t canvas-school-portal:${{ github.sha }} .

  publish:
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: env.DOCKERHUB_USERNAME != ''
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: env.DOCKERHUB_USERNAME != ''
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/canvas-school-portal:latest
