services:
  - type: web
    name: canvas-school-portal
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_TEACHER_PASSWORD
        sync: false
      - key: DEMO_STUDENT_PASSWORD
        sync: false
